<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson 8</title>
  </head>
  <body>
    <p>Login Form</p>
    <form action="">
      <input type="text" placeholder="အမည်ထည့်ပါ" />
      <br /><br />
      <input type="password" placeholder="စကားဝှတ်ထည့်ပါ" />
      <br /><br />
      <input type="submit" value="Login" />
    </form>

    <br /><br />

    <p>Register Form</p>
    <form action="">
      <input type="text" placeholder="အမည်ထည့်ပါ" />
      <br /><br />
      <input type="tel" placeholder="ဖုန်းနံပါတ်ထည့်ပါ" />
      <br /><br />
      <input type="email" placeholder="အီးမေလ်ထည့်ပါ" />
      <br /><br />
      <input type="number" placeholder="အသက်ထည့်ပါ" />
      <br /><br />
      <input type="date" placeholder="မွေးနေ့ထည့်ပါ" />
      <br />

      <p>Choose</p>
      <input type="radio" id="male" name="gender" value="Male" />
      <label for="male">Male</label><br />
      <input type="radio" id="female" name="gender" value="Female" />
      <label for="female">Female</label><br />

      <p>Choose Country</p>
      <select name="" id="">
        <option value="myanmar">Myanmar</option>
        <option value="myanmar">Thailand</option>
        <option value="myanmar">Singapore</option>
        <option value="myanmar">Cambodia</option>
        <option value="myanmar">Laos</option>
      </select>

      <br /><br />

      <p>Upload your photo</p>
      <input type="file" placeholder="" />
      <br />
      <br />

      <p>Write your info</p>
      <textarea name="" id="" placeholder="Write here..." rows="4"></textarea>
      <br /><br />

      <input type="checkbox" id="checkbox" />
      <label for="checkbox">I agree Terms & Conditions.</label>
      <br />
      <br />

      <input type="submit" value="Register" />
    </form>
  </body>
</html>
